openapi: 3.1.0
info:
  title: 第一階門訓課程助理 API
  description: |
    禱告手冊清單、每日內容、閱讀進度。身分驗證使用 query 參數 email。建議 GPTs 使用 email 流程：先問 email → 呼叫 GET /email/books → 有訂閱則列書選書，無訂閱則回覆尚未訂閱。
  version: 1.0.0

servers:
  - url: https://your-service.zeabur.app
    description: Zeabur 第一階門訓課程助理 API（請在正式切換前更新）
  - url: https://stage1-discipleship-assistant-api-43747267943.asia-northeast1.run.app
    description: Legacy Cloud Run 回滾用 API

paths:
  /email/books:
    get:
      operationId: getEmailBooks
      summary: 依 email 查詢已訂閱書單
      description: 依訂閱時使用的 email 查詢 Wix 訂閱紀錄，回傳該 email 已訂閱的書單。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 使用者訂閱時使用的 Email
      responses:
        '200':
          description: 已訂閱書單
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscribed_books:
                    type: array
                    description: 該 email 已訂閱的書；每筆含 number（1 起）、book_id、book_name。使用者選數字時請用 number 對應到該筆的 book_id。
                    items:
                      type: object
                      properties:
                        number: { type: integer, description: '選項編號（1、2、3…），使用者回覆此數字時請用本筆的 book_id' }
                        book_id: { type: string }
                        book_name: { type: string }
                  user_name: { type: string, nullable: true, description: '訂閱表填寫的姓名，取得後可用於問候' }
                  all_books_subscribed: { type: boolean, description: 'true 表示已訂閱所有可用手冊；false 表示仍有未訂閱手冊' }
        '400':
          description: 缺少 email 參數

  /init:
    get:
      operationId: init
      summary: 初始化（訂閱狀態 + 手冊清單）
      description: 單次呼叫回傳 hasSubscription 與 books（已訂閱才回傳 books）。身分請帶 query email。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫）
      responses:
        '200':
          description: 初始化結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasSubscription: { type: boolean }
                  books:
                    type: array
                    items:
                      type: object
                      properties:
                        book_id: { type: string }
                        book_name: { type: string }

  /books:
    get:
      operationId: getBooks
      summary: 取得禱告手冊清單
      description: 回傳所有可選的禱告手冊（book_id、book_name），供使用者選擇。
      responses:
        '200':
          description: 手冊清單
          content:
            application/json:
              schema:
                type: object
                properties:
                  books:
                    type: array
                    items:
                      type: object
                      properties:
                        book_id: { type: string }
                        book_name: { type: string }

  /content:
    get:
      operationId: getContent
      summary: 取得指定手冊指定日的內容
      description: |
        依 book_id 與 day 回傳當日禱告內容。身分請帶 query email。
        若尚未訂閱該手冊，仍回傳 200，body 含 subscribed false 與 error，請以查詢結果方式呈現。
        成功回傳內容時，後端會自動寫入一筆閱讀紀錄（gpt/7），包含 email、書、天數、閱讀時間，以及從訂閱表帶入的姓名、教會。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫）
        - name: book_id
          in: query
          required: true
          schema: { type: string }
          description: 手冊 ID（從 /books 或 /email/books 取得）
        - name: day
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 31 }
          description: 第幾天（1–31），不傳則為「今天」對應的日
      responses:
        '200':
          description: 當日內容或未訂閱結果（依 body 的 subscribed 判斷）
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: 已訂閱，回傳內容
                    properties:
                      book_id: { type: string }
                      book_name: { type: string }
                      day: { type: integer }
                      title: { type: string }
                      content: { type: string }
                  - type: object
                    description: 未訂閱
                    properties:
                      subscribed: { type: boolean, example: false }
                      error: { type: string, example: '很抱歉，您尚未訂閱第一階門訓課程助理！' }
        '404':
          description: 找不到該日內容

  /titles:
    get:
      operationId: getTitles
      summary: 取得指定手冊 1–31 天標題清單
      description: 依 book_id 回傳該手冊 1–31 天的標題清單。身分請帶 query email。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫）
        - name: book_id
          in: query
          required: true
          schema: { type: string }
          description: 手冊 ID（從 /books 或 /email/books 取得）
      responses:
        '200':
          description: 標題清單或未訂閱結果
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: 已訂閱，回傳標題清單
                    properties:
                      book_id: { type: string }
                      book_name: { type: string }
                      titles:
                        type: array
                        description: 1–31 天的標題（無內容則為 null）
                        items:
                          type: object
                          properties:
                            day: { type: integer, minimum: 1, maximum: 31 }
                            title: { type: string, nullable: true }
                  - type: object
                    description: 未訂閱
                    properties:
                      subscribed: { type: boolean, example: false }
                      error: { type: string, example: '很抱歉，您尚未訂閱第一階門訓課程助理！' }

  /progress:
    get:
      operationId: getProgress
      summary: 取得當前使用者的閱讀進度
      description: 依 email 從閱讀紀錄推導最後一次閱讀的手冊與天數。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫）
      responses:
        '200':
          description: 閱讀進度
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_book_id: { type: string, nullable: true }
                  last_book_name: { type: string, nullable: true }
                  last_day: { type: integer, nullable: true }
                  last_read_date: { type: string, nullable: true }
                  message: { type: string }

  /subscription-status:
    get:
      operationId: getSubscriptionStatus
      summary: 取得當前使用者的訂閱狀態
      description: 依 email 檢查是否有任一有效訂閱。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫）
      responses:
        '200':
          description: 訂閱狀態
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasSubscription: { type: boolean, description: 是否有任一有效訂閱 }

  /reading-record/last-day:
    get:
      operationId: getLastReadingDay
      summary: 取得使用者在指定手冊的最後閱讀天數
      description: 依 email 與 book_id 從閱讀紀錄找出該手冊最後閱讀天數，並回傳 next_day。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫）
        - name: book_id
          in: query
          required: true
          schema: { type: string }
          description: 手冊 ID（從 /books 或 /email/books 取得）
      responses:
        '200':
          description: 最後閱讀天數與下一天
          content:
            application/json:
              schema:
                type: object
                properties:
                  book_id: { type: string }
                  last_day: { type: integer, nullable: true, description: 該書最後閱讀天數；無紀錄則為 null }
                  next_day: { type: integer, description: 建議讀取天數（last_day+1；無紀錄則為 1） }

  /qa:
    get:
      operationId: getQa
      summary: 整本手冊 QA（RAG）
      description: |
        依問題從向量庫搜尋相關禱告手冊內容，並以 AI 生成回答。身分請帶 query email。
        使用者須有至少一筆有效訂閱；若提供 book_id，則須已訂閱該手冊。
      parameters:
        - name: email
          in: query
          required: true
          schema: { type: string, format: email }
          description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫）
        - name: question
          in: query
          required: true
          schema: { type: string }
          description: 使用者問題（對整本手冊的提問）
        - name: book_id
          in: query
          required: false
          schema: { type: string }
          description: 手冊 ID（選填，限定搜尋範圍；未提供則搜尋所有）
        - name: conversation_id
          in: query
          required: false
          schema: { type: string }
          description: 對話群組 id（不傳則由後端生成並於回應回傳）；同一 ChatGPT 對話內多輪追問請沿用上一則回應的 conversation_id
        - name: mode
          in: query
          required: false
          schema: { type: string, enum: [companion] }
          description: 保留欄位（可忽略）；通過訂閱檢查且成功產生回答之 QA 皆會寫入對話紀錄
      responses:
        '200':
          description: AI 回答與出處
          content:
            application/json:
              schema:
                type: object
                required: [answer, sources, conversation_id]
                properties:
                  answer: { type: string, description: AI 生成的回答 }
                  sources:
                    type: array
                    description: 參考內容出處（書名、天數）
                    items:
                      type: object
                      properties:
                        book_name: { type: string }
                        day: { type: integer }
                  conversation_id:
                    type: string
                    description: 本筆 QA 所屬群組 id；多輪追問時請帶回同一值
        '400':
          description: 缺少 question
        '403':
          description: 未訂閱或無權限
    post:
      operationId: postQa
      x-openai-isConsequential: false
      summary: 整本手冊 QA（RAG，POST）
      description: 同 GET /qa，但 question 與 book_id 可放於 body。
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, question]
              properties:
                email: { type: string, format: email, description: 訂閱時使用的 Email（必填；未取得使用者 email 前勿呼叫） }
                question: { type: string }
                book_id: { type: string }
                conversation_id:
                  type: string
                  description: 對話群組 id（不傳則由後端生成並於回應回傳）；多輪追問請沿用上一則回應的 conversation_id
                mode:
                  type: string
                  enum: [companion]
                  description: 保留欄位（可忽略）；通過訂閱檢查且成功產生回答之 QA 皆會寫入對話紀錄
      responses:
        '200':
          description: AI 回答與出處
          content:
            application/json:
              schema:
                type: object
                required: [answer, sources, conversation_id]
                properties:
                  answer: { type: string }
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        book_name: { type: string }
                        day: { type: integer }
                  conversation_id:
                    type: string
                    description: 本筆 QA 所屬群組 id；多輪追問時請帶回同一值
        '400':
          description: 缺少 question
        '403':
          description: 未訂閱或無權限

  /companion/log:
    post:
      operationId: postCompanionLog
      x-openai-isConsequential: false
      summary: 陪談與靈修心得每輪寫入對話紀錄
      description: |
        供 Companion Mode 與靈修心得分享模式每輪對話落紀錄到 Ragic gpt/10。
        每次需同時提供 user_message 與 assistant_message；
        若未帶 conversation_id，後端會自動生成並回傳，後續同主題請沿用。
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, user_message, assistant_message]
              properties:
                email:
                  type: string
                  format: email
                  description: 訂閱時使用的 Email（必填）
                user_message:
                  type: string
                  description: 本輪使用者訊息（原文）
                assistant_message:
                  type: string
                  description: 本輪助手回覆（原文）
                conversation_id:
                  type: string
                  description: 對話群組 id（不傳則由後端生成並於回應回傳）
      responses:
        '200':
          description: 寫入成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, conversation_id]
                properties:
                  ok: { type: boolean, example: true }
                  conversation_id:
                    type: string
                    description: 本輪寫入所屬群組 id
        '400':
          description: 缺少 user_message 或 assistant_message
        '403':
          description: 未訂閱或無權限
